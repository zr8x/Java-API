apply plugin: 'java'
apply plugin: 'application'

repositories {
    mavenCentral()  // jcenter() is shut down, use this instead
}

dependencies {
    implementation 'org.json:json:20240303'
    testImplementation 'junit:junit:4.12'
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
    }
    test {
        java {
            srcDirs = ['test']  // point this to wherever your test files are
        }
    }
}

mainClassName = 'App'